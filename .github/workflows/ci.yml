name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  # ── Backend: Python lint + type check + docstring coverage + tests ─────────
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Strict type check (mypy)
        run: mypy app

      - name: Docstring coverage (interrogate ≥ 95%)
        run: interrogate app

      - name: Cyclomatic complexity gate (radon — no grade C or worse)
        run: python -m radon cc app -n C --total-average

      - name: Run tests with branch coverage
        env:
          GEMINI_API_KEY: ""
        run: |
          coverage run -m pytest tests/ -v
          coverage report -m --fail-under=90

  # ── Frontend: TS compile + lint + tests ───────────────────────────────────
  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict type check
        run: npm run typecheck

      - name: Lint (oxlint — zero warnings)
        run: npm run lint

      - name: Run Vitest test suite
        run: npm test

      - name: Production build
        run: npm run build
